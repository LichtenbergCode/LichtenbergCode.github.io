theme:  
    name: material
    languages: es
    custom_dir: assets
    font: 
      text: Merriweather Sans
      code: Red Hat Mono
    icon: 
        logo: fontawesome/solid/robot
    favicon: img/robot-head.ico
    features: 
        - content.tabs.link
        - header.autohide
        - announce.dismiss
        - navigation.footer
        - navigation.indexes
      #  - navigation.sections
      #  - navigation.instant
        - navigation.tabs
        - navigation.top
      #  - navigation.expand
        - navigation.tracking 
        - search.highlight
        - search.share
        - search.suggest
        - content.code.copy
        - content.code.annotate
    
    palette: 
        - scheme: slate
          primary: black
          accent: indigo 
          toggle:
              icon: material/weather-night
              name: Switch to light mode 
        
        - scheme: default
          primary: black
          accent: teal
          toggle:
              icon: material/weather-sunny
              name: Switch to dark mode
extra_css:
    - stylesheets/extra.css

plugins: 
    - search
    - include-markdown
    - mermaid2
    - mkdocs-jupyter
    #- video
    - blog:
        blog_toc: true
        active_date_format: yyyy
        active_url_date_formar: yyyy
        #categories_allowed:
        #  - Tech
        #  - ROS 2
        #  - Drone Control
        #  - Hailo-8
        #  - Raspberry Pi
        #  - Linux
        #  - IA
        post_url_format: "{slug}"
        authors_profiles: true
    
    - tags:
        tags_file: tags.md

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span # added
      pygments_lang_class: true # added
  - pymdownx.inlinehilite
  - pymdownx.superfences # added
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra: 
    social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/LichtenbergCode
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/albertolombera21/

